apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: servicepulse

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres

          image: postgres:16

          imagePullPolicy: Always

          ports:
            - containerPort: 5432

          env:

            - name: POSTGRES_DB
              value: servicepulse

            - name: POSTGRES_USER
              value: servicepulse

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD

          volumeMounts:

            - name: postgres-storage
              mountPath: /var/lib/postgresql/data


      volumes:

        - name: postgres-storage

          persistentVolumeClaim:
            claimName: postgres-pvc
