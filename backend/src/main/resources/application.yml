spring:

  config:
    import: optional:file:./.env.properties


  application:
    name: smart-incident-management


  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  mail:
    host: smtp.gmail.com
    port: 587

    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect



jwt:

  secret: ${JWT_SECRET}

  expiration:
    ms: ${JWT_EXPIRATION:3600000}



logging:

  level:

    root: INFO

    com.smartims: DEBUG

    org.springframework.mail: DEBUG

    org.eclipse.angus.mail: DEBUG